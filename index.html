<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ôn tập Lịch Sử Lớp 12 – Trắc nghiệm Hoạt Động Đối Ngoại Việt Nam 1945 đến nay." />
  <meta property="og:title" content="Trắc Nghiệm: Hoạt Động Đối Ngoại Việt Nam" />
  <meta property="og:description" content="10 câu trắc nghiệm Lịch Sử Lớp 12 – Đối ngoại Việt Nam 1945–Nay" />
  <meta property="og:type" content="website" />
  <title>Trắc Nghiệm: Hoạt Động Đối Ngoại Việt Nam</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & TOKENS ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:     #ff6b9d;
      --peach:    #ffb347;
      --mint:     #4ecdc4;
      --sky:      #74b9ff;
      --lavender: #a29bfe;
      --red-flag: #da020e;
      --green:    #00b894;
      --red:      #e17055;
      --page-bg:  #fff5f8;
      --text:     #2d3436;
      --muted:    #636e72;
      --border:   #f0e0e8;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: var(--page-bg);
      min-height: 100vh;
      padding-bottom: 60px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    /* ── DECORATIVE BG ── */
    .bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-deco::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle 180px at 5%  15%, #ffd6e7aa 0%, transparent 70%),
        radial-gradient(circle 140px at 95% 10%, #c7ecee99 0%, transparent 70%),
        radial-gradient(circle 200px at 90% 85%, #ffeaa788 0%, transparent 70%),
        radial-gradient(circle 160px at 8%  85%, #dfe6fd99 0%, transparent 70%);
    }

    /* ── CORNER SVG ── */
    .corner-svg { position: fixed; pointer-events: none; z-index: 0; }
    .corner-svg.tl { top: 0; left: 0; }
    .corner-svg.tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner-svg.bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner-svg.br { bottom: 0; right: 0; transform: scale(-1); }

    /* ── FLOATING EMOJI ── */
    .float-item {
      position: fixed; pointer-events: none; z-index: 0;
      opacity: .55; font-size: 1.4rem; user-select: none;
      animation: floatAnim ease-in-out infinite alternate;
    }
    @keyframes floatAnim {
      from { transform: translateY(0)     rotate(-5deg); }
      to   { transform: translateY(-16px) rotate(5deg); }
    }

    /* ── Z-LAYER ── */
    .header, .slides-container, #result-screen, #thankyou-screen { position: relative; z-index: 1; }

    /* ── HEADER ── */
    .header { text-align: center; padding: 38px 20px 18px; margin-bottom: 4px; }
    .header-emoji-row {
      font-size: 2rem; letter-spacing: 6px; margin-bottom: 12px;
      display: inline-block; animation: wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }
    .header h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, var(--red-flag) 0%, var(--pink) 50%, var(--peach) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; line-height: 1.2;
    }
    .header .subtitle { color: var(--muted); font-size: 1rem; font-weight: 600; }
    .badge-row { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .badge {
      background: white; border: 2px solid var(--border); border-radius: 20px;
      padding: 4px 14px; font-size: .78rem; font-weight: 700; color: var(--muted);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .badge.red   { border-color: #ffb3c6; color: var(--red-flag); background: #fff5f7; }
    .badge.mint  { border-color: #b2ebe8; color: #00897b;         background: #f0fffe; }
    .badge.peach { border-color: #ffd6a5; color: #e67e22;         background: #fff8f0; }

    /* ── SLIDES ── */
    .slides-container { max-width: 860px; margin: 0 auto; padding: 0 16px; min-height: 400px; }
    .slide { display: none; animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
    .slide.active { display: block; }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: white; border-radius: 28px; padding: 36px 36px 28px;
      box-shadow: 0 8px 40px rgba(255,107,157,.12), 0 2px 12px rgba(0,0,0,.06);
      border: 2px solid var(--border); position: relative; overflow: hidden;
    }
    .question-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, var(--red-flag), var(--pink), var(--peach), var(--mint), var(--sky), var(--lavender));
      border-radius: 28px 28px 0 0;
    }
    .question-card::after {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle, #ffeaa7 0%, transparent 70%); opacity: .45;
    }
    .q-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .question-number {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--red-flag), var(--pink));
      color: white; font-size: .78rem; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; padding: 6px 16px; border-radius: 20px;
      box-shadow: 0 3px 10px rgba(218,2,14,.25);
    }
    .question-text {
      font-size: 1.38rem; font-weight: 700; line-height: 1.65;
      color: #2d3436; margin-bottom: 28px; padding-left: 4px;
    }

    /* ── OPTIONS ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .option-btn {
      position: relative; padding: 15px 16px 15px 56px; border-radius: 16px;
      border: 2.5px solid #f0e8f5; background: #fafafa; color: var(--text);
      font-size: 1rem; font-weight: 700; font-family: inherit; line-height: 1.45;
      cursor: pointer; text-align: left; transition: all .22s cubic-bezier(.34,1.56,.64,1);
      min-height: 66px;
    }
    .option-btn .letter {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border-radius: 50%; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 900; transition: all .22s;
    }
    .option-btn:nth-child(1) .letter { background: linear-gradient(135deg,#fd79a8,#e84393); box-shadow: 0 2px 8px rgba(253,121,168,.4); }
    .option-btn:nth-child(2) .letter { background: linear-gradient(135deg,#74b9ff,#0984e3); box-shadow: 0 2px 8px rgba(116,185,255,.4); }
    .option-btn:nth-child(3) .letter { background: linear-gradient(135deg,#55efc4,#00b894); box-shadow: 0 2px 8px rgba(85,239,196,.4); }
    .option-btn:nth-child(4) .letter { background: linear-gradient(135deg,#fdcb6e,#e17055); box-shadow: 0 2px 8px rgba(253,203,110,.4); }
    .option-btn:hover:not(:disabled) {
      border-color: var(--pink); background: #fff5f9;
      transform: translateY(-3px) scale(1.01); box-shadow: 0 8px 24px rgba(255,107,157,.18);
    }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct {
      border-color: #00b894 !important; background: #f0fff8 !important;
      box-shadow: 0 6px 24px rgba(0,184,148,.25) !important; transform: scale(1.02) !important;
    }
    .option-btn.correct .letter {
      background: linear-gradient(135deg,#00b894,#00cec9) !important;
      box-shadow: 0 3px 12px rgba(0,184,148,.5) !important;
    }
    .option-btn.wrong { border-color: #e17055 !important; background: #fff5f3 !important; }
    .option-btn.wrong .letter {
      background: linear-gradient(135deg,#e17055,#d63031) !important;
      box-shadow: 0 3px 12px rgba(225,112,85,.5) !important;
    }

    /* ── EXPLANATION ── */
    .explanation { display: none; margin-top: 20px; padding: 16px 20px; border-radius: 14px; font-size: .97rem; font-weight: 600; line-height: 1.6; }
    .explanation.show        { display: block; animation: popIn .35s ease; }
    .explanation.correct-exp { background: #e8fdf5; border: 2px solid #b2f0d4; color: #00695c; }
    .explanation.wrong-exp   { background: #fff3f0; border: 2px solid #ffd0c0; color: #c0392b; }

    /* ── NAV ── */
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; gap: 10px; }
    .nav-btn {
      padding: 11px 26px; border-radius: 50px; border: 2.5px solid var(--border);
      background: white; color: var(--muted); font-size: .92rem; font-weight: 800;
      font-family: inherit; cursor: pointer; transition: all .2s;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--pink); color: var(--pink); transform: translateY(-2px); }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .nav-btn.primary {
      background: linear-gradient(135deg, var(--red-flag), var(--pink));
      border-color: transparent; color: white; box-shadow: 0 4px 16px rgba(218,2,14,.3);
    }
    .nav-btn.primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(218,2,14,.35); }
    .nav-counter { font-size: .82rem; font-weight: 700; color: var(--muted); background: #f7f0ff; padding: 6px 14px; border-radius: 20px; }

    /* ── RESULT SCREEN ── */
    #result-screen {
      display: none; text-align: center; animation: popIn .5s ease;
      padding: 40px 20px; max-width: 600px; margin: 0 auto;
    }
    .result-confetti { font-size: 3rem; margin-bottom: 10px; animation: bounce 1s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    .result-circle {
      width: 170px; height: 170px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(0,184,148,.3);
    }
    .result-inner {
      width: 138px; height: 138px; border-radius: 50%; background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.06);
    }
    .result-score { font-size: 3rem; font-weight: 900; color: var(--green); }
    .result-total { font-size: .95rem; color: var(--muted); font-weight: 700; }
    .result-title { font-size: 1.9rem; font-weight: 900; color: var(--text); margin-bottom: 10px; }
    .result-msg   { color: var(--muted); font-size: 1.05rem; font-weight: 600; margin-bottom: 30px; line-height: 1.5; }
    .result-badges { display: flex; justify-content: center; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
    .r-badge { padding: 8px 18px; border-radius: 20px; font-size: .85rem; font-weight: 800; border: 2px solid; }
    .r-badge.g { background: #e8fdf5; border-color: #b2f0d4; color: #00695c; }
    .r-badge.r { background: #fff3f0; border-color: #ffd0c0; color: #c0392b; }
    .retry-btn {
      padding: 15px 44px;
      background: linear-gradient(135deg, var(--red-flag), var(--pink));
      border: none; border-radius: 50px; color: white;
      font-size: 1.05rem; font-weight: 900; font-family: inherit;
      cursor: pointer; transition: all .2s; box-shadow: 0 6px 20px rgba(218,2,14,.3);
    }
    .retry-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(218,2,14,.4); }

    /* ── THANK-YOU SCREEN ── */
    #thankyou-screen {
      display: none; text-align: center; animation: popIn .6s ease;
      padding: 60px 20px; max-width: 700px; margin: 0 auto;
    }
    .ty-flowers { font-size: 2.6rem; letter-spacing: 8px; margin-bottom: 24px; animation: wiggle 3s ease-in-out infinite; }
    .ty-card {
      background: white; border-radius: 28px; padding: 44px 40px;
      box-shadow: 0 10px 50px rgba(255,107,157,.15), 0 2px 16px rgba(0,0,0,.07);
      border: 2px solid var(--border); position: relative; overflow: hidden;
    }
    .ty-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 7px;
      background: linear-gradient(90deg, var(--red-flag), var(--pink), var(--peach), var(--mint), var(--sky), var(--lavender));
      border-radius: 28px 28px 0 0;
    }
    .ty-emoji { font-size: 4rem; margin-bottom: 16px; display: block; animation: bounce 1.4s ease infinite alternate; }
    .ty-title {
      font-size: 1.7rem; font-weight: 900; margin-bottom: 18px;
      background: linear-gradient(135deg, var(--red-flag), var(--pink), var(--peach));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ty-text {
      font-size: 1.18rem; font-weight: 700; color: var(--text); line-height: 1.8; margin-bottom: 10px;
    }
    .ty-sub { font-size: .95rem; color: var(--muted); font-weight: 600; margin-bottom: 30px; }
    .ty-divider {
      height: 2px; border-radius: 2px; margin: 24px auto;
      background: linear-gradient(90deg, transparent, var(--pink), var(--peach), transparent);
      max-width: 260px;
    }
    .ty-names { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 28px; }
    .ty-name-badge {
      background: #fff0f5; border: 2px solid #ffb3c6; border-radius: 20px;
      padding: 6px 16px; font-size: .88rem; font-weight: 800; color: var(--red-flag);
    }
    .ty-flag-row { font-size: 2rem; letter-spacing: 6px; margin-top: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .options-grid  { grid-template-columns: 1fr; }
      .header h1     { font-size: 1.5rem; }
      .question-card { padding: 24px 20px 20px; }
      .question-text { font-size: 1.15rem; }
      .ty-card       { padding: 30px 20px; }
      .ty-title      { font-size: 1.35rem; }
      .ty-text       { font-size: 1rem; }
    }
  </style>
</head>

  <!-- ── QUIZ LOGIC ── -->
  <script>
    /* ── DATA ── */
    const questions = [
      {
        q:   "Ngày 6/3/1946, Việt Nam ký với Pháp văn bản nào để tạm thời hòa hoãn và đuổi quân Trung Hoa Dân Quốc về nước?",
        opts:["Hiệp định Genève","Hiệp định Sơ bộ Việt – Pháp","Tạm ước Việt – Pháp","Hiệp định Paris"],
        ans: 1,
        exp: "Ngày 6/3/1946, Việt Nam ký Hiệp định Sơ bộ Việt – Pháp. Pháp công nhận Việt Nam là quốc gia tự do trong Liên hiệp Pháp và quân Trung Hoa Dân Quốc rút khỏi Việt Nam."
      },
      {
        q:   "Hiệp định Genève 1954 tạm thời chia cắt Việt Nam tại vĩ tuyến bao nhiêu, đồng thời dự kiến tổng tuyển cử thống nhất năm nào?",
        opts:["Vĩ tuyến 16, năm 1955","Vĩ tuyến 17, năm 1956","Vĩ tuyến 18, năm 1957","Vĩ tuyến 20, năm 1958"],
        ans: 1,
        exp: "Hiệp định Genève 1954 tạm thời chia cắt đất nước tại vĩ tuyến 17, dự kiến tổng tuyển cử thống nhất năm 1956."
      },
      {
        q:   "Trong giai đoạn 1968–1973, Việt Nam đã áp dụng phương thức đàm phán nào để kết hợp với đấu tranh quân sự?",
        opts:["Đàm phán đa phương hóa","Vừa đánh vừa đàm","Ngoại giao mềm dẻo độc lập","Đàm phán không điều kiện"],
        ans: 1,
        exp: "Giai đoạn 1968–1973, Việt Nam tiến hành đàm phán tại Hội nghị Pari với phương châm 'vừa đánh vừa đàm', kết hợp đấu tranh ngoại giao với quân sự và chính trị."
      },
      {
        q:   "Ngày 3/11/1978, Việt Nam ký kết hiệp ước quan trọng gì với Liên Xô?",
        opts:["Hiệp ước không xâm phạm","Hiệp ước phòng thủ chung","Hiệp ước hữu nghị và hợp tác","Hiệp ước tương trợ kinh tế"],
        ans: 2,
        exp: "Ngày 3/11/1978, Việt Nam ký Hiệp ước hữu nghị và hợp tác với Liên Xô, tăng cường quan hệ để được ủng hộ trong xây dựng và bảo vệ đất nước."
      },
      {
        q:   "Việt Nam gia nhập Hội đồng Tương trợ Kinh tế (SEV) vào ngày tháng năm nào?",
        opts:["3/11/1978","29/6/1978","7/1/1979","30/4/1975"],
        ans: 1,
        exp: "Ngày 29/6/1978, Việt Nam gia nhập Hội đồng Tương trợ Kinh tế (SEV) – tổ chức hợp tác kinh tế của các nước xã hội chủ nghĩa."
      },
      {
        q:   "Năm 1977, Việt Nam chính thức gia nhập tổ chức quốc tế nào?",
        opts:["ASEAN","SEV (Hội đồng Tương trợ Kinh tế)","Liên hợp quốc","WTO"],
        ans: 2,
        exp: "Năm 1977, Việt Nam chính thức gia nhập Liên hợp quốc, qua đó mở rộng quan hệ quốc tế và nâng cao vị thế trên trường quốc tế."
      },
      {
        q:   "Việt Nam chính thức gia nhập ASEAN vào năm nào, đánh dấu bước hội nhập khu vực quan trọng?",
        opts:["1991","1993","1995","1997"],
        ans: 2,
        exp: "Năm 1995, Việt Nam gia nhập ASEAN, mở rộng quan hệ khu vực và tăng cường hợp tác với các nước thành viên Đông Nam Á."
      },
      {
        q:   "Sau Đổi mới 1986, đường lối đối ngoại của Việt Nam được định hướng theo phương châm chủ đạo nào?",
        opts:["Đơn phương hóa, tập trung vào các nước XHCN","Đa phương hóa và đa dạng hóa quan hệ quốc tế","Ưu tiên quan hệ song phương với các cường quốc","Trung lập hóa hoàn toàn trong quan hệ quốc tế"],
        ans: 1,
        exp: "Từ năm 1986, Việt Nam thực hiện đường lối đối ngoại đổi mới: mở rộng quan hệ, đa phương hóa và đa dạng hóa quan hệ quốc tế."
      },
      {
        q:   "Việt Nam bình thường hóa quan hệ ngoại giao với Hoa Kỳ vào năm nào và ký Hiệp định Thương mại song phương vào năm nào?",
        opts:["1991 và 1995","1993 và 1998","1995 và 2000","1997 và 2001"],
        ans: 2,
        exp: "Việt Nam bình thường hóa quan hệ với Hoa Kỳ năm 1995, sau đó ký Hiệp định Thương mại Việt Nam – Hoa Kỳ năm 2000."
      },
      {
        q:   "Trong giai đoạn 1975–1985, Việt Nam đã tham gia bao nhiêu tổ chức quốc tế và ký kết bao nhiêu điều ước quốc tế?",
        opts:["20 tổ chức và 10 điều ước","33 tổ chức và 19 điều ước","40 tổ chức và 25 điều ước","15 tổ chức và 30 điều ước"],
        ans: 1,
        exp: "Trong giai đoạn 1975–1985, Việt Nam tham gia 33 tổ chức quốc tế và 19 điều ước quốc tế, thể hiện sự chủ động hội nhập quốc tế."
      }
    ];

    const ICONS   = ["📜","🗺️","⚔️","🤝","🏛️","🌐","🌏","🔄","🇺🇸","📊"];
    const LETTERS = ["A","B","C","D"];

    /* ── STATE ── */
    let currentQ     = 0;
    let answered     = new Array(questions.length).fill(null);
    let correctCount = 0;
    let wrongCount   = 0;

    /* ── BUILD SLIDES ── */
    function buildQuiz() {
      const container = document.getElementById("slides-container");
      container.innerHTML = "";

      questions.forEach((q, i) => {
        const slide = document.createElement("div");
        slide.className = "slide" + (i === 0 ? " active" : "");
        slide.id = "slide-" + i;

        const optsHtml = q.opts.map((opt, oi) =>
          '<button class="option-btn" id="opt-' + i + '-' + oi + '" onclick="selectAnswer(' + i + ',' + oi + ')">' +
            '<span class="letter" aria-hidden="true">' + LETTERS[oi] + '</span>' + opt +
          '</button>'
        ).join("");

        const nextBtn = i < questions.length - 1
          ? '<button class="nav-btn primary" onclick="goTo(' + (i + 1) + ')">Tiếp →</button>'
          : '<button class="nav-btn primary" onclick="showResult()">Hoàn thành 🎉</button>';

        slide.innerHTML =
          '<div class="question-card">' +
            '<div class="q-header"><div class="question-number">' + ICONS[i] + ' Câu ' + (i+1) + ' / ' + questions.length + '</div></div>' +
            '<p class="question-text">' + q.q + '</p>' +
            '<div class="options-grid">' + optsHtml + '</div>' +
            '<div class="explanation" id="exp-' + i + '" role="alert"></div>' +
            '<div class="nav-row">' +
              '<button class="nav-btn" onclick="goTo(' + (i-1) + ')" ' + (i === 0 ? "disabled" : "") + '>← Trước</button>' +
              '<div class="nav-counter">' + (i+1) + ' / ' + questions.length + '</div>' +
              nextBtn +
            '</div>' +
          '</div>';

        container.appendChild(slide);
      });
    }

    /* ── SELECT ANSWER ── */
    function selectAnswer(qIdx, optIdx) {
      if (answered[qIdx] !== null) return;
      const q         = questions[qIdx];
      const isCorrect = optIdx === q.ans;

      answered[qIdx] = isCorrect ? "correct" : "wrong";
      if (isCorrect) correctCount++; else wrongCount++;

      for (var i = 0; i < q.opts.length; i++) {
        var btn = document.getElementById("opt-" + qIdx + "-" + i);
        btn.disabled = true;
        if (i === q.ans)                    btn.classList.add("correct");
        else if (i === optIdx && !isCorrect) btn.classList.add("wrong");
      }

      var expEl = document.getElementById("exp-" + qIdx);
      expEl.textContent = (isCorrect ? "✅ Chính xác! " : "❌ Chưa đúng. ") + q.exp;
      expEl.className   = "explanation show " + (isCorrect ? "correct-exp" : "wrong-exp");
    }

    /* ── NAVIGATE ── */
    function goTo(idx) {
      if (idx < 0 || idx >= questions.length) return;
      document.getElementById("slide-" + currentQ).classList.remove("active");
      currentQ = idx;
      document.getElementById("slide-" + currentQ).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    /* ── SHOW RESULT → go straight to thank-you ── */
    function showResult() {
      document.getElementById("slides-container").style.display  = "none";
      document.getElementById("thankyou-screen").style.display   = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    /* ── INIT ── */
    buildQuiz();
  </script>
